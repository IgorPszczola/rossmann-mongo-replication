version: '3.8'

services:
  mongodb:
    image: mongo:7.0.11
    container_name: rossmann_mongo
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=rossmann_db
    volumes:
      - mongo_data:/data/db

  mongo-init-replica:
    image: mongo:7.0.11
    container_name: rossmann_mongo_init
    depends_on:
      - mongodb
    entrypoint: [ "/bin/sh", "-c", "sleep 5 && mongosh --host mongodb:27017 --eval 'rs.initiate()'" ]

  python-app:
    build: .
    container_name: rossmann_generator
    depends_on:
      - mongodb

  python-listener:
    build: .
    container_name: rossmann_listener
    depends_on:
      - mongodb
    command: ["python", "-u", "pipeline.py"]

volumes:
  mongo_data: